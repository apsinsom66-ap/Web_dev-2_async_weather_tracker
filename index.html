<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Async Weather Tracker</title>
<link rel="stylesheet" href="index.css">
</head>

<body>

<h1>🌤 Async Weather Tracker</h1>

<div class="main-container">

<div class="card">
<h3>Search City</h3>

<input type="text" id="cityInput" placeholder="Enter city">
<button onclick="searchCity()">Search</button>

<h4>Search History</h4>
<div id="history"></div>

</div>

<div class="card">

<h3>Weather Info</h3>

<p><b>City</b> <span id="city">-</span></p>
<p><b>Temp</b> <span id="temp">-</span></p>
<p><b>Weather</b> <span id="weather">-</span></p>
<p><b>Humidity</b> <span id="humidity">-</span></p>
<p><b>Wind</b> <span id="wind">-</span></p>

</div>

</div>

<div class="console">
<h3>Console – Event Loop</h3>
<pre id="consoleLog"></pre>
</div>

<script src="index.js"></script>

</body>
</html>
